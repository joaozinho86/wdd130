<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Fale Conosco | Companhia de Rafting em Corredeiras</title>
    <meta name="description"
        content="Entre em contato com a Companhia de Rafting em Corredeiras. Veja endereço, telefone, e-mail, mapa e fale diretamente com nossa equipe para dúvidas, reservas ou sugestões.">
    <link rel="stylesheet" href="rafting.css">
</head>

<body>
    <header>
        <!-- Cabeçalho e navegação iguais às outras páginas -->
    </header>

    <main>
        <section class="company-info">
            <h2>Informações da Empresa</h2>
            <p>123 Rua Principal do Rio<br>Foz do Iguaçu, Paraná</p>
            <p>Telefone: +55 45 99999-9999</p>
            <p>Email: info@correiras.com</p>
            <iframe src="https://www.google.com/maps/embed?..."></iframe>
        </section>

        <section class="team">
            <h2>Estamos Aqui para Servi-lo</h2>
            <figure>
                <img src="joao.jpg" alt="João Silva">
                <figcaption>João Silva — Guia de Rafting</figcaption>
            </figure>
            <figure>
                <img src="maria.jpg" alt="Maria Souza">
                <figcaption>Maria Souza — Atendimento ao Cliente</figcaption>
            </figure>
            <figure>
                <img src="carlos.jpg" alt="Carlos Pereira">
                <figcaption>Carlos Pereira — Instrutor de Segurança</figcaption>
            </figure>
        </section>

        <section class="contact-form">
            <h2>Entre em Contato</h2>
            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <p>Finalidade da Mensagem:</p>
                <input type="radio" id="consulta" name="finalidade" value="consulta">
                <label for="consulta">Consulta Geral</label>

                <input type="radio" id="reserva" name="finalidade" value="reserva">
                <label for="reserva">Pergunta sobre Reserva</label>

                <input type="radio" id="sugestao" name="finalidade" value="sugestao">
                <label for="sugestao">Sugestão de Site</label>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem"></textarea>

                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Quero receber a newsletter mensal</label>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <!-- Rodapé igual às outras páginas -->
    </footer>
</body>

</html>
