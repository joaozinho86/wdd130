<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Nós | Rio Abaixo Rafting</title>

    <meta name="description"
        content="Página Sobre Nós da empresa Rio Abaixo, dedicada ao rafting e aventuras na natureza.">
    <meta name="author" content="João Correa">

    <link rel="stylesheet" href="estilos/rafting.css">
</head>

<body>

    <!-- Header -->
    <header>
        <img src="imagens/rio-abaixo.png" alt="Logotipo Rio Abaixo">
        <nav>
            <a href="index.html">Página Inicial</a>
            <a href="sobre.html">Sobre Nós</a>
            <a href="passeios.html">Passeios</a>
            <a href="contato.html">Fale Conosco</a>
        </nav>
    </header>

    <main>

        <!-- Hero -->
        <div class="hero">
            <h1>Rio Abaixo Rafting</h1>
            <article>
                <img src="imagens/perfil.webp" alt="Foto de perfil do instrutor de rafting">
            </article>
        </div>

        <!-- História -->
        <section class="historia">
            <h2>História</h2>
            <p>
                A Rio Abaixo nasceu do sonho de três amigos apaixonados por esportes radicais.
                Começamos com apenas dois botes e muita vontade de explorar os rios da região.
            </p>
        </section>

        <!-- Aventura -->
        <section class="aventura">
            <h2>A aventura está te esperando!</h2>
            <figure>
                <img src="imagens/rio-negro.webp" alt="Salto do Rio Negro">
                <figcaption>Salto do Rio Negro</figcaption>
            </figure>
            <figure>
                <img src="imagens/paranapanema.webp" alt="Corredeira do Rio Paranapanema">
                <figcaption>Corredeira do Rio Paranapanema</figcaption>
            </figure>
            <figure>
                <img src="imagens/jacare.webp" alt="Corredeira do Rio Jacaré">
                <figcaption>Corredeira do Rio Jacaré</figcaption>
            </figure>
            <figure>
                <img src="imagens/iguacu.webp" alt="Corredeira do Rio Iguaçu">
                <figcaption>Corredeira do Rio Iguaçu</figcaption>
            </figure>
            <figure>
                <img src="imagens/amazonas.webp" alt="Corredeira do Rio Amazonas">
                <figcaption>Corredeira do Rio Amazonas</figcaption>
            </figure>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Rio Abaixo — João Correa</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank">
                <img src="imagens/facebook-square.svg" alt="Facebook">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="imagens/instagram-square.svg" alt="Instagram">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="imagens/linkedin-square.svg" alt="Linkedin">
            </a>
        </nav>
    </footer>

</body>

</html>
