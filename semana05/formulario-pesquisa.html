<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Formulário HTML – Enquete do Usuário</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>WDD 130 | Formulário HTML – Enquete do Usuário</h1>
</header>

<form action="#" method="post">

  <fieldset>
    <legend>Informações de Contato</legend>

    <div class="item-formulario coluna2">
      <label for="nomecompleto">Nome Completo:</label>
      <input type="text" id="nomecompleto" name="nomecompleto" required>
    </div>

    <div class="item-formulario coluna2">
      <label for="emaildousuario">Email:</label>
      <input type="email" id="emaildousuario" name="emaildousuario" required>
    </div>
  </fieldset>

  <fieldset>
    <legend>Perguntas</legend>

    <div class="item-formulario coluna2">
      <label for="navegador">Qual é o seu navegador de internet favorito?</label>
      <select id="navegador" name="navegador">
        <option value="chrome">Chrome</option>
        <option value="firefox">Firefox</option>
        <option value="edge">Edge</option>
        <option value="safari">Safari</option>
        <option value="opera">Opera</option>
      </select>
    </div>

    <div class="item-formulario coluna2">
      <label for="animal">Você tem um animal de estimação?</label>
      <input type="checkbox" id="animal" name="animal">
    </div>

    <div class="item-formulario coluna2">
      <label for="lugares">Liste os lugares onde você morou:</label>
      <textarea id="lugares" name="lugares" rows="4">Stillwater Flórida, Amsterdam Holanda, Tibuktu Mali</textarea>
    </div>
  </fieldset>

  <button type="submit">Enviar Enquete</button>

</form>

<footer>
  <p>©2025 | Formulário HTML – Atividade de Enquete do Usuário | Xavier Rodriquez</p>
</footer>

</body>
</html>
