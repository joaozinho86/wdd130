<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Web: HTML e CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="quiz-card">
        <h1>Desafio Web: HTML e CSS</h1>

        <form action="/enviar-resposta" method="POST">

            <!-- Pergunta 1: Text -->
            <div class="form-group">
                <label for="q1">1. Qual atributo HTML é utilizado para abrir um link em uma nova aba do
                    navegador?</label>
                <input type="text" name="q1" id="q1" placeholder="Ex: target=&quot;_blank&quot;" required>
            </div>

            <!-- Pergunta 2: Textarea -->
            <div class="form-group">
                <label for="q2">2. Descreva com suas palavras qual é a diferença entre as propriedades de espaçamento
                    'margin' e 'padding' no CSS.</label>
                <textarea name="q2" id="q2" placeholder="Escreva sua explicação técnica aqui..." required></textarea>
            </div>

            <!-- Pergunta 3: Select -->
            <div class="form-group">
                <label for="q3">3. Qual modelo de layout do CSS é mais indicado para alinhar elementos em uma única
                    dimensão (linhas OU colunas)?</label>
                <select name="q3" id="q3" required>
                    <option value="" selected disabled>Escolha uma...</option>
                    <option value="flexbox">CSS Flexbox</option>
                    <option value="grid">CSS Grid Layout</option>
                    <option value="float">Floats Tradicionais</option>
                </select>
            </div>

            <!-- Pergunta 4: Number -->
            <div class="form-group">
                <label for="q4">4. Qual é o valor numérico da opacidade total de um elemento configurado via CSS
                    (completamente visível)?</label>
                <input type="number" name="q4" id="q4" min="0" max="1" step="0.1" placeholder="Ex: 0 ou 1" required>
            </div>

            <!-- Botão de Envio -->
            <button type="submit">Enviar Questionário</button>

        </form>
    </div>

</body>

</html>
